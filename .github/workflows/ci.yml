name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch: # Allow manual triggering

permissions:
  actions: read
  contents: read
  security-events: write

env:
  DOTNET_VERSION: '8.0.x'
  
jobs:
  lint-format-and-test:
    name: 🔍 Code Quality, Formatting & Testing
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v6
      
    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: 📦 Restore dependencies
      run: dotnet restore
      
    - name: 🔧 Build solution
      run: dotnet build --no-restore --configuration Release
      
    - name: 🧪 Run unit tests
      run: dotnet test tests/BicepGuard.Tests/BicepGuard.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --verbosity normal
      
    - name: 📊 Upload test results
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: test-results
        path: tests/BicepGuard.Tests/TestResults/
        retention-days: 30
      continue-on-error: true
      
    - name: 🎯 Check code formatting
      run: dotnet format BicepGuard.csproj --verify-no-changes --verbosity diagnostic
      continue-on-error: true # Don't fail on formatting issues for now
      
    - name: 📋 Run code analysis
      run: dotnet build --configuration Release --verbosity normal
      
  build-and-test:
    name: 🏗️ Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v6
      
    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: 📦 Restore dependencies
      run: dotnet restore
      
    - name: 🔧 Build project
      run: dotnet build --no-restore --configuration Release
      
    - name: ✅ Build Status
      run: echo "🎉 Build successful on ${{ matrix.os }}!"
        
  security-analysis:
    name: 🔒 Security Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    continue-on-error: true # Don't fail the entire workflow if CodeQL setup isn't complete
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v6
      
    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: 🔍 Run security analysis
      run: |
        dotnet list BicepGuard.csproj package --vulnerable --include-transitive || true
        dotnet list BicepGuard.csproj package --deprecated || true
        
    - name: 🛡️ Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: csharp
      continue-on-error: true
        
    - name: 📦 Restore dependencies for analysis
      run: dotnet restore BicepGuard.csproj
        
    - name: 🔧 Build for analysis
      run: dotnet build BicepGuard.csproj --configuration Release --no-restore
      
    - name: 🔍 Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:csharp"
      continue-on-error: true
      
  validate-bicep:
    name: 🔧 Validate Bicep Templates
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v6
      
    - name: ⚙️ Setup Azure CLI
      run: |
        curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
        az version
        
    - name: 🔧 Install Bicep CLI
      run: az bicep install
      
    - name: ✅ Validate Bicep templates
      run: |
        echo "🔍 Validating Bicep templates..."
        for file in *.bicep; do
          if [[ -f "$file" ]]; then
            echo "Validating $file..."
            az bicep build --file "$file" --stdout > /dev/null
            echo "✅ $file is valid"
          fi
        done
        
  create-release-artifacts:
    name: 📦 Create Release Artifacts
    runs-on: ubuntu-latest
    needs: [lint-format-and-test, build-and-test, security-analysis]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      actions: write
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v6
      
    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: 📦 Restore dependencies
      run: dotnet restore BicepGuard.csproj
      
    - name: 🏗️ Build for multiple platforms
      run: |
        # Build for Windows x64
        dotnet publish BicepGuard.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./artifacts/win-x64
        
        # Build for Linux x64
        dotnet publish BicepGuard.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o ./artifacts/linux-x64
        
        # Build for macOS x64
        dotnet publish BicepGuard.csproj -c Release -r osx-x64 --self-contained true -p:PublishSingleFile=true -o ./artifacts/osx-x64
        
    - name: 📋 Create build info
      run: |
        echo "Build Information" > ./artifacts/BUILD_INFO.txt
        echo "=================" >> ./artifacts/BUILD_INFO.txt
        echo "Build Date: $(date)" >> ./artifacts/BUILD_INFO.txt
        echo "Commit SHA: ${{ github.sha }}" >> ./artifacts/BUILD_INFO.txt
        echo "Branch: ${{ github.ref_name }}" >> ./artifacts/BUILD_INFO.txt
        echo ".NET Version: ${{ env.DOTNET_VERSION }}" >> ./artifacts/BUILD_INFO.txt
        
    - name: 📤 Upload artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: release-artifacts
        path: ./artifacts/
        retention-days: 90
        
  report-status:
    name: 📊 Build Status Report
    runs-on: ubuntu-latest
    needs: [lint-format-and-test, build-and-test, security-analysis, validate-bicep]
    if: always()
    
    steps:
    - name: 📊 Report Success
      if: needs.lint-format-and-test.result == 'success' && needs.build-and-test.result == 'success' && needs.security-analysis.result == 'success' && needs.validate-bicep.result == 'success'
      run: |
        echo "✅ All quality checks passed!"
        echo "🎉 BicepGuard is ready for deployment!"
        
    - name: ❌ Report Failure
      if: needs.lint-format-and-test.result == 'failure' || needs.build-and-test.result == 'failure' || needs.security-analysis.result == 'failure' || needs.validate-bicep.result == 'failure'
      run: |
        echo "❌ Some quality checks failed:"
        echo "Lint, Format & Test: ${{ needs.lint-format-and-test.result }}"
        echo "Build & Test: ${{ needs.build-and-test.result }}"  
        echo "Security Analysis: ${{ needs.security-analysis.result }}"
        echo "Bicep Validation: ${{ needs.validate-bicep.result }}"
        exit 1
