name: Reusable Drift Detection

on:
  workflow_call:
    inputs:
      bicep-file:
        description: 'Path to the Bicep template or .bicepparam file'
        required: true
        type: string
      scope:
        description: 'Deployment scope: ResourceGroup or Subscription'
        required: false
        type: string
        default: 'ResourceGroup'
      resource-group:
        description: 'Azure resource group (required for ResourceGroup scope)'
        required: false
        type: string
        default: ''
      location:
        description: 'Azure region (required for Subscription scope)'
        required: false
        type: string
        default: 'westeurope'
      environment-name:
        description: 'Environment name (e.g., dev, staging, prod) for reporting'
        required: false
        type: string
        default: 'production'
      bicepguard-version:
        description: 'BicepGuard version to use'
        required: false
        type: string
        default: 'v5.0.0'
      autofix:
        description: 'Automatically fix drift by deploying template'
        required: false
        type: boolean
        default: false
      create-issue:
        description: 'Create GitHub issue when drift is detected'
        required: false
        type: boolean
        default: true
      ignore-config:
        description: 'Path to custom drift-ignore.json file'
        required: false
        type: string
        default: ''
    secrets:
      AZURE_CLIENT_ID:
        description: 'Azure Service Principal Client ID'
        required: true
      AZURE_TENANT_ID:
        description: 'Azure Tenant ID'
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: 'Azure Subscription ID'
        required: true
    outputs:
      drift-detected:
        description: 'Whether drift was detected'
        value: ${{ jobs.detect-drift.outputs.drift-detected }}
      drift-count:
        description: 'Number of resources with drift'
        value: ${{ jobs.detect-drift.outputs.drift-count }}

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  detect-drift:
    name: 🔍 Detect Drift
    runs-on: ubuntu-latest
    outputs:
      drift-detected: ${{ steps.drift.outputs.drift_detected }}
      drift-count: ${{ steps.drift.outputs.drift_count }}

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

    - name: 📦 Download BicepGuard
      env:
        BICEPGUARD_VERSION: ${{ inputs.bicepguard-version }}
      run: |
        echo "Downloading BicepGuard ${BICEPGUARD_VERSION}..."
        curl -Lo bicepguard.tar.gz "https://github.com/mwhooo/bicepguard/releases/download/${BICEPGUARD_VERSION}/bicepguard-linux-x64.tar.gz" || {
          echo "Binary not found, downloading source and building..."
          curl -Lo bicepguard.zip "https://github.com/mwhooo/bicepguard/archive/refs/tags/${BICEPGUARD_VERSION}.zip"
          unzip -q bicepguard.zip
          mv BicepGuard-* bicepguard-src
        }

    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309 # v5
      with:
        dotnet-version: '8.0.x'

    - name: 🏗️ Build BicepGuard (if needed)
      run: |
        if [ -d "bicepguard-src" ]; then
          cd bicepguard-src
          dotnet build --configuration Release
          echo "BICEPGUARD_PATH=bicepguard-src/bin/Release/net8.0/BicepGuard.dll" >> $GITHUB_ENV
        elif [ -f "bicepguard.tar.gz" ]; then
          tar -xzf bicepguard.tar.gz
          chmod +x bicepguard
          echo "BICEPGUARD_PATH=./bicepguard" >> $GITHUB_ENV
        fi

    - name: 🔧 Install Bicep CLI
      run: |
        curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
        chmod +x ./bicep
        sudo mv ./bicep /usr/local/bin/bicep
        bicep --version

    - name: 🔐 Azure Login (OIDC)
      uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: 🔍 Run Drift Detection
      id: drift
      env:
        INPUT_SCOPE: ${{ inputs.scope }}
        INPUT_LOCATION: ${{ inputs.location }}
        INPUT_RESOURCE_GROUP: ${{ inputs.resource-group }}
        INPUT_BICEP_FILE: ${{ inputs.bicep-file }}
        INPUT_IGNORE_CONFIG: ${{ inputs.ignore-config }}
        INPUT_AUTOFIX: ${{ inputs.autofix }}
        INPUT_ENVIRONMENT_NAME: ${{ inputs.environment-name }}
        AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      run: |
        set +e
        
        # Validate required parameters based on scope
        if [ "$INPUT_SCOPE" = "ResourceGroup" ] && [ -z "$INPUT_RESOURCE_GROUP" ]; then
          echo "❌ Error: resource-group is required when scope is ResourceGroup"
          exit 1
        fi
        
        if [ "$INPUT_SCOPE" = "Subscription" ] && [ -z "$INPUT_LOCATION" ]; then
          echo "❌ Error: location is required when scope is Subscription"
          exit 1
        fi
        
        IGNORE_CONFIG=""
        if [ -n "$INPUT_IGNORE_CONFIG" ] && [ -f "$INPUT_IGNORE_CONFIG" ]; then
          IGNORE_CONFIG="--ignore-config $INPUT_IGNORE_CONFIG"
        fi
        
        AUTOFIX=""
        if [ "$INPUT_AUTOFIX" = "true" ]; then
          AUTOFIX="--autofix"
        fi
        
        # Build scope-specific arguments using environment variables (safer than direct interpolation)
        SCOPE_ARGS="--scope $INPUT_SCOPE"
        if [ "$INPUT_SCOPE" = "Subscription" ]; then
          SCOPE_ARGS="$SCOPE_ARGS --subscription $AZURE_SUBSCRIPTION_ID --location $INPUT_LOCATION"
          TARGET_DESC="subscription $AZURE_SUBSCRIPTION_ID"
        else
          SCOPE_ARGS="$SCOPE_ARGS --resource-group $INPUT_RESOURCE_GROUP"
          TARGET_DESC="resource group $INPUT_RESOURCE_GROUP"
        fi
        
        echo "Running drift detection for $TARGET_DESC"
        
        if [[ "$BICEPGUARD_PATH" == *.dll ]]; then
          dotnet $BICEPGUARD_PATH \
            --bicep-file "$INPUT_BICEP_FILE" \
            $SCOPE_ARGS \
            --output Json \
            --simple-output \
            $IGNORE_CONFIG \
            $AUTOFIX \
            > drift-report.json 2>&1
        else
          $BICEPGUARD_PATH \
            --bicep-file "$INPUT_BICEP_FILE" \
            $SCOPE_ARGS \
            --output Json \
            --simple-output \
            $IGNORE_CONFIG \
            $AUTOFIX \
            > drift-report.json 2>&1
        fi
        
        EXIT_CODE=$?
        
        if [ $EXIT_CODE -eq 0 ]; then
          echo "drift_detected=false" >> $GITHUB_OUTPUT
          echo "drift_count=0" >> $GITHUB_OUTPUT
          echo "✅ No drift detected in $INPUT_ENVIRONMENT_NAME"
        else
          echo "drift_detected=true" >> $GITHUB_OUTPUT
          DRIFT_COUNT=$(cat drift-report.json | grep -o '"ResourcesWithDrift":' | wc -l || echo "1")
          echo "drift_count=$DRIFT_COUNT" >> $GITHUB_OUTPUT
          echo "❌ Drift detected in $INPUT_ENVIRONMENT_NAME"
        fi
        
        exit 0

    - name: 📊 Upload Drift Report
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: drift-report-${{ inputs.environment-name }}
        path: drift-report.json
        retention-days: 30

    - name: 🐛 Create Issue on Drift
      if: steps.drift.outputs.drift_detected == 'true' && inputs.create-issue == true
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
      env:
        INPUT_SCOPE: ${{ inputs.scope }}
        INPUT_LOCATION: ${{ inputs.location }}
        INPUT_RESOURCE_GROUP: ${{ inputs.resource-group }}
        INPUT_BICEP_FILE: ${{ inputs.bicep-file }}
        INPUT_ENVIRONMENT_NAME: ${{ inputs.environment-name }}
        AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('drift-report.json', 'utf8');
          
          const scope = process.env.INPUT_SCOPE;
          const location = process.env.INPUT_LOCATION;
          const resourceGroup = process.env.INPUT_RESOURCE_GROUP;
          const bicepFile = process.env.INPUT_BICEP_FILE;
          const environmentName = process.env.INPUT_ENVIRONMENT_NAME;
          const subscriptionId = process.env.AZURE_SUBSCRIPTION_ID;
          
          const targetInfo = scope === 'Subscription' 
            ? `**Subscription:** ${subscriptionId}\n**Location:** ${location}`
            : `**Resource Group:** ${resourceGroup}`;
          
          const issueTitle = `🚨 Configuration Drift Detected - ${environmentName}`;
          const issueBody = `## Configuration Drift Detected
          
          **Environment:** ${environmentName}
          **Scope:** ${scope}
          ${targetInfo}
          **Bicep File:** ${bicepFile}
          **Detection Time:** ${new Date().toISOString()}
          
          ### Drift Report
          \`\`\`json
          ${report}
          \`\`\`
          
          ### Remediation
          Run the following command to fix the drift:
          \`\`\`bash
          dotnet run -- --bicep-file ${bicepFile} --scope ${scope} ${scope === 'Subscription' ? `--subscription <sub-id> --location ${location}` : `--resource-group ${resourceGroup}`} --autofix
          \`\`\`
          
          Or re-deploy through your CI/CD pipeline.
          `;
          
          // Check for existing open issue
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: `drift-detection,${environmentName}`
          });
          
          if (issues.data.length > 0) {
            // Update existing issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issues.data[0].number,
              body: `## Updated Drift Report\n\n**Time:** ${new Date().toISOString()}\n\n\`\`\`json\n${report}\n\`\`\``
            });
          } else {
            // Create new issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['drift-detection', environmentName]
            });
          }

    - name: ✅ Close Issue if No Drift
      if: steps.drift.outputs.drift_detected == 'false' && inputs.create-issue == true
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
      env:
        INPUT_ENVIRONMENT_NAME: ${{ inputs.environment-name }}
      with:
        script: |
          const environmentName = process.env.INPUT_ENVIRONMENT_NAME;
          
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: `drift-detection,${environmentName}`
          });
          
          for (const issue of issues.data) {
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed',
              state_reason: 'completed'
            });
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: '✅ Drift has been resolved. Closing this issue.'
            });
          }
