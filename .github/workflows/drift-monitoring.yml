name: 🔍 Azure Drift Monitoring (Example)

# This workflow is disabled in this repository but will work automatically when
# copied to your infrastructure repository. Simply copy this file and update the
# configuration below with your Azure resource details.
#
# The workflow is already configured to run on manual trigger (workflow_dispatch).
# To enable automatic scheduled runs:
# 1. Add a schedule trigger:
#    on:
#      schedule:
#        - cron: '0 */6 * * *'  # Every 6 hours
#      workflow_dispatch:
# 2. Update the matrix below with your resource groups and templates
# 3. Ensure Azure OIDC authentication is configured (see docs/OIDC-SETUP.md)

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  id-token: write  # Required for OIDC authentication

jobs:
  monitor-drift:
    # This job will only run when copied to a different repository
    if: github.repository != 'mwhooo/bicepguard'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment:
          - { name: 'dev', resource_group: 'YOUR_RESOURCE_GROUP', template: 'path/to/your-template.bicepparam' }
      fail-fast: false
      
    name: Monitor ${{ matrix.environment.name }}
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'
    
    - name: Install Bicep CLI
      run: |
        curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
        chmod +x ./bicep
        sudo mv ./bicep /usr/local/bin/bicep
      
    - name: Azure Login
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Build BicepGuard
      run: dotnet build BicepGuard.csproj --configuration Release

    - name: Check Drift
      id: check
      continue-on-error: true
      run: |
        chmod +x .github/scripts/check-drift.sh
        .github/scripts/check-drift.sh "${{ matrix.environment.template }}" "${{ matrix.environment.resource_group }}" "drift-report.json" "drift-ignore.json"
    
    - name: Upload Drift Report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: drift-report-${{ matrix.environment.name }}
        path: drift-report.json

    - name: Create Issue on Drift
      if: steps.check.outputs.drift == 'true'
      uses: actions/github-script@v9
      with:
        script: |
          const { createDriftIssue } = require('./.github/scripts/create-drift-issue.js');
          const environment = '${{ matrix.environment.name }}';
          
          const issueData = createDriftIssue(environment, context);
          
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: issueData.title,
            body: issueData.body,
            labels: issueData.labels
          });
          
          console.log('✅ Created drift alert issue successfully');