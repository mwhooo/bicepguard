name: 🚀 Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0
  workflow_dispatch: # Allow manual triggering
    inputs:
      version:
        description: 'Release version (e.g., 2.2.0)'
        required: true
        default: '2.2.0'
      create_tag:
        description: 'Create git tag'
        required: true
        default: true
        type: boolean

env:
  DOTNET_VERSION: '8.0.x'

permissions:
  contents: write

jobs:
  create-release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0 # Fetch full history for changelog
        
    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: 📋 Extract version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
          echo "Using manual version: $VERSION"
        else
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Using tag version: $VERSION"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
        
    - name: 🏷️ Create git tag (if manual dispatch)
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_tag == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
        git push origin "v${{ steps.version.outputs.version }}"
        
    - name: 📦 Restore dependencies
      run: dotnet restore BicepGuard.csproj
      
    - name: 🏗️ Build release artifacts
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        # Create output directory
        mkdir -p release-artifacts
        
        # Build for Windows x64 (inject version from git tag)
        dotnet publish BicepGuard.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:Version=$VERSION -o ./temp/win-x64
        zip -r release-artifacts/BicepGuard-${VERSION}-win-x64.zip ./temp/win-x64/
        
        # Build for Linux x64  
        dotnet publish BicepGuard.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:Version=$VERSION -o ./temp/linux-x64
        tar -czf release-artifacts/BicepGuard-${VERSION}-linux-x64.tar.gz -C ./temp/linux-x64 .
        
        # Build for macOS x64
        dotnet publish BicepGuard.csproj -c Release -r osx-x64 --self-contained true -p:PublishSingleFile=true -p:Version=$VERSION -o ./temp/osx-x64
        zip -r release-artifacts/BicepGuard-${VERSION}-osx-x64.zip ./temp/osx-x64/
        
        # Create portable .NET version (requires .NET runtime)
        dotnet publish BicepGuard.csproj -c Release --no-self-contained -p:Version=$VERSION -o ./temp/portable
        zip -r release-artifacts/BicepGuard-${VERSION}-portable.zip ./temp/portable/
        
    - name: 📋 Generate release notes
      id: changelog
      run: |
        # Generate changelog since last tag
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        if [ -n "$PREVIOUS_TAG" ]; then
          echo "Generating changelog since $PREVIOUS_TAG"
          CHANGELOG=$(git log --pretty=format:"- %s (%an)" $PREVIOUS_TAG..HEAD)
        else
          echo "No previous tag found, generating changelog from beginning"
          CHANGELOG=$(git log --pretty=format:"- %s (%an)" HEAD)
        fi
        
        # Create release notes
        cat > release_notes.md << EOF
        # BicepGuard v${{ steps.version.outputs.version }}
        
        ## 🎯 What's New
        
        A sophisticated C# console application that detects configuration drift between Bicep/ARM templates and live Azure resources.
        
        ## 📋 Changes in this release
        
        $CHANGELOG
        
        ## 📦 Downloads
        
        Choose the appropriate package for your platform:
        
        - **Windows x64**: \`BicepGuard-${{ steps.version.outputs.version }}-win-x64.zip\` (Self-contained executable)
        - **Linux x64**: \`BicepGuard-${{ steps.version.outputs.version }}-linux-x64.tar.gz\` (Self-contained executable)
        - **macOS x64**: \`BicepGuard-${{ steps.version.outputs.version }}-osx-x64.zip\` (Self-contained executable)
        - **Portable**: \`BicepGuard-${{ steps.version.outputs.version }}-portable.zip\` (Requires .NET 8 runtime)
        
        ## 🚀 Quick Start
        
        1. Download the appropriate package for your platform
        2. Extract the archive
        3. Run: \`./BicepGuard --bicep-file template.bicep --resource-group myResourceGroup\`
        
        ## ✨ Key Features
        
        - 🔍 **Intelligent Drift Detection** - Property-level comparison with smart filtering
        - 🧠 **Conditional Deployment Support** - Respects Bicep \`if\` conditions  
        - 🔧 **Smart Subnet Analysis** - Detects service endpoints and NSG associations
        - 📊 **Multi-Format Reporting** - Console, JSON, HTML, and Markdown output
        - 🎛️ **Azure CLI Integration** - Seamless live resource querying
        
        ## 📚 Documentation
        
        Full documentation available in the [README.md](https://github.com/mwhooo/bicepguard/blob/main/README.md)
        
        Built with ❤️ for DevOps teams practicing Infrastructure as Code!
        EOF
        
        # Set output for GitHub release
        echo "release_notes<<EOF" >> $GITHUB_OUTPUT
        cat release_notes.md >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
    - name: 🚀 Create GitHub Release
      uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
      with:
        name: BicepGuard v${{ steps.version.outputs.version }}
        body: ${{ steps.changelog.outputs.release_notes }}
        files: release-artifacts/*
        draft: false
        prerelease: false
        tag_name: v${{ steps.version.outputs.version }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 📊 Release Summary
      run: |
        echo "🎉 Successfully created release v${{ steps.version.outputs.version }}!"
        echo "📦 Release artifacts:"
        ls -la release-artifacts/
        echo ""
        echo "🔗 Release URL: https://github.com/mwhooo/bicepguard/releases/tag/v${{ steps.version.outputs.version }}"