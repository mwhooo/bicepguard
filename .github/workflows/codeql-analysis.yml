name: "CodeQL Security Analysis"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1' # Run weekly on Mondays at 6 AM UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: 🔍 CodeQL Analysis
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        language: [ 'csharp' ]

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
      with:
        dotnet-version: '8.0.x'

    - name: 🛡️ Initialize CodeQL
      uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
      with:
        languages: ${{ matrix.language }}
        # Override default queries with security-focused ones
        queries: security-extended,security-and-quality

    - name: 📦 Restore dependencies
      run: dotnet restore BicepGuard.csproj

    - name: 🔧 Build project
      run: dotnet build BicepGuard.csproj --configuration Release --no-restore

    - name: 🔍 Perform CodeQL Analysis
      uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
      with:
        category: "/language:${{matrix.language}}"

    - name: 📊 Analysis Summary
      if: success()
      run: |
        echo "🎉 CodeQL analysis completed successfully!"
        echo "✅ Scanned C# codebase for security vulnerabilities"
        echo "📋 Results uploaded to GitHub Security tab"